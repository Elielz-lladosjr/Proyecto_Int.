apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.api.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: {{ .Values.images.api }}
        imagePullPolicy: Never
        ports:
        - containerPort: {{ .Values.api.containerPort }}
        env:
        - name: DB_HOST
          value: {{ .Values.api.env.dbHost | quote }}
        - name: DB_PORT
          value: {{ .Values.api.env.dbPort | quote }}
        - name: DB_USER
          value: {{ .Values.api.env.dbUser | quote }}
        - name: DB_PASSWORD
          value: {{ .Values.api.env.dbPassword | quote }}
        - name: DB_NAME
          value: {{ .Values.api.env.dbName | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.api.serviceName }}
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 3000
      targetPort: {{ .Values.api.containerPort }}
      nodePort: {{ .Values.api.nodePort }}